[workspace]
resolver = "2"
members = [
    "crates/myownmesh-core",
    "crates/myownmesh-signaling",
    "crates/myownmesh-updater",
    "crates/myownmesh",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.88.0"
license = "MIT"
authors = ["Chris Paul"]
repository = "https://github.com/mrjeeves/MyOwnMesh"
description = "Pure-Rust peer-to-peer mesh networking on webrtc-rs."

[workspace.dependencies]
# Internal crates
myownmesh-core = { path = "crates/myownmesh-core", version = "0.1.0" }
myownmesh-signaling = { path = "crates/myownmesh-signaling", version = "0.1.0" }
myownmesh-updater = { path = "crates/myownmesh-updater", version = "0.1.0" }

# Async runtime
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time", "io-util", "net", "fs", "signal"] }
tokio-util = { version = "0.7", features = ["rt"] }
tokio-stream = "0.1"
futures-util = "0.3"
async-trait = "0.1"

# Crypto + encoding
ed25519-dalek = { version = "2", features = ["rand_core", "serde"] }
rand_core = { version = "0.6", features = ["getrandom"] }
getrandom = "0.2"
sha2 = "0.10"
data-encoding = "2"
hex = "0.4"
bytes = "1"

# Serde
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Errors + logging
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Bin
clap = { version = "4", features = ["derive", "env"] }
dirs = "5"
which = "6"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
