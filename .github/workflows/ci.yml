name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check / ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    # -D warnings is scoped to this job on purpose: setting RUSTFLAGS at the
    # workflow level would override (not merge with) the per-target rustflags in
    # .cargo/config.toml, dropping the appliance cross-builds' +crt-static and
    # -u getrandom guard. The daemon-cross job below must inherit those instead.
    env:
      RUSTFLAGS: "-D warnings"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux-x86_64,   os: ubuntu-22.04 }
          - { name: macos-aarch64,  os: macos-14 }
          - { name: windows-x86_64, os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --no-fail-fast

  # Validate the static-musl appliance daemons actually cross-compile on every
  # PR — not just at release time. Both riscv64 (NanoKVM) and aarch64-musl
  # (NanoKVM-Pro) are the exact `cargo zigbuild` invocations release.yml ships,
  # so a broken .cargo/config.toml, a dependency that won't cross-compile, or the
  # static-musl getrandom link regression is caught here instead of at release.
  # NOTE: this job deliberately has no RUSTFLAGS env, so .cargo/config.toml's
  # per-target rustflags (+crt-static, -u getrandom) apply.
  daemon-cross:
    name: daemon cross-compile / ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - riscv64gc-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: daemon-cross-${{ matrix.target }}

      - name: Install Zig + cargo-zigbuild
        run: |
          set -e
          python3 -m pip install --upgrade "ziglang==0.13.0"
          printf '#!/usr/bin/env bash\nexec python3 -m ziglang "$@"\n' | sudo tee /usr/local/bin/zig >/dev/null
          sudo chmod +x /usr/local/bin/zig
          zig version
          cargo install cargo-zigbuild --locked

      - name: Cross-build daemon
        run: cargo zigbuild --release --bin myownmesh --target ${{ matrix.target }}
