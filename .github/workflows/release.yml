name: Release

# Triggered either by pushing a tag `v*` or by `gh workflow run`
# (which is what `just release X.Y.Z` does). The `tag` input lets a
# maintainer kick off a release for a tag that doesn't exist yet —
# the tauri-action call below creates the GitHub release at that name.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  bundles:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux builds are pinned to Ubuntu 22.04 (glibc 2.35) — not
          # ubuntu-latest — so the resulting binaries run on Ubuntu
          # 22.04+, Debian 12, and other distros still on glibc
          # 2.35/2.36/2.38. Building on 24.04 links against glibc 2.39
          # and breaks anything older with "GLIBC_2.39 not found".
          # Matches MyOwnLLM's release.yml so users get the same
          # portability promise across both apps.
          - { name: linux-x86_64,   os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu }
          - { name: linux-aarch64,  os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
          - { name: macos-aarch64,  os: macos-14,         target: aarch64-apple-darwin }
          - { name: macos-x86_64,   os: macos-14,         target: x86_64-apple-darwin }
          - { name: windows-x86_64, os: windows-latest,   target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      # Guard against the "tag says v0.2.0, binary reports 0.1.5"
      # trap. The daemon binary embeds CARGO_PKG_VERSION (via
      # [workspace.package].version) at compile time, and the GUI's
      # window title pulls from gui/src-tauri/Cargo.toml. If any
      # manifest disagrees with the tag, every install will misreport
      # itself and the self-update poll will loop forever. The
      # workspace Cargo.toml is the source of truth; scripts/bump-version.sh
      # keeps the GUI sub-workspace files in sync.
      - name: Verify tag matches manifest versions
        shell: bash
        run: |
          set -e
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${TAG#v}"
          fail() { echo "::error::$*"; exit 1; }
          got_workspace=$(awk '
            /^\[workspace\.package\]/ {in_pkg=1; next}
            /^\[/ {in_pkg=0}
            in_pkg && /^version =/ {gsub(/[ "]/, "", $0); split($0, a, "="); print a[2]; exit}
          ' Cargo.toml)
          got_gui_cargo=$(awk -F\" '/^version = / {print $2; exit}' gui/src-tauri/Cargo.toml)
          got_gui_pkg=$(node -e "console.log(require('./gui/package.json').version)")
          [[ "$got_workspace" == "$EXPECTED" ]] || fail "Cargo.toml [workspace.package].version is $got_workspace, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          [[ "$got_gui_cargo" == "$EXPECTED" ]] || fail "gui/src-tauri/Cargo.toml version is $got_gui_cargo, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          [[ "$got_gui_pkg"   == "$EXPECTED" ]] || fail "gui/package.json version is $got_gui_pkg, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          echo "Manifest versions match tag $TAG ($EXPECTED)."

      # Tauri build needs the GTK / webkit stack on Linux; the
      # headless daemon doesn't, but installing here covers both
      # build steps in one place.
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev xdg-utils

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform.target }}

      # Two separate Cargo workspaces in this repo — the headless
      # daemon at the root, and the Tauri GUI under `gui/src-tauri`.
      # Each gets its own cache scope so they don't stomp each other.
      - name: Cache (daemon workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: daemon-${{ matrix.platform.os }}

      - name: Cache (GUI workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri -> target
          key: gui-${{ matrix.platform.os }}

      # No `version:` — pnpm/action-setup@v4 reads the version from
      # gui/package.json's `packageManager` field. Pinning a
      # different `version:` here causes pnpm 10+ to refuse to run
      # with ERR_PNPM_BAD_PM_VERSION. There is no root package.json
      # in this repo, so point the action at the GUI manifest
      # explicitly — otherwise it fails with "No pnpm version is
      # specified".
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: gui/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Install GUI dependencies
        working-directory: gui
        run: pnpm install --frozen-lockfile

      # Build the headless daemon first. The bundle step below will
      # ship it alongside the GUI installer so users get one
      # download per platform that contains both halves.
      - name: Build daemon
        run: cargo build --release --bin myownmesh --target ${{ matrix.platform.target }}

      # Build the Tauri GUI bundle. tauri-action runs `pnpm tauri
      # build` under the hood and uploads the resulting installers
      # (.deb / .AppImage / .dmg / .msi / .exe) to the named
      # release. `projectPath: gui` points it at the GUI's own
      # workspace so it doesn't try to build the daemon as a Tauri
      # crate.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: ${{ inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.platform.target }}

      # Package the portable daemon binary as a tarball / zip so
      # users who don't want the GUI installer can `curl | tar` it.
      # The .sha256 sidecar matches MyOwnLLM's release pattern so
      # the self-updater verification logic is identical.
      - name: Package portable daemon binary
        shell: bash
        run: |
          set -e
          BIN=target/${{ matrix.platform.target }}/release/myownmesh
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "daemon binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="myownmesh-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/myownmesh.exe"
            (cd dist-bin && 7z a "${NAME}.zip" myownmesh.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
          else
            cp "$BIN" "dist-bin/myownmesh"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin myownmesh
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
          fi

      # Package the portable GUI binary the same way, so the curl|sh
      # installer can drop `myownmesh-gui` next to `myownmesh` on PATH
      # and a bare `myownmesh` finds it via sibling lookup. The OS
      # bundles (.deb/.dmg/.msi/...) uploaded above are still the
      # "proper install"; this is the lightweight half for the CLI
      # installer. Remove the raw binary afterwards so it isn't caught
      # by the upload glob below — only the archives + .sha256 ship.
      - name: Package portable GUI binary
        shell: bash
        run: |
          set -e
          BIN=gui/src-tauri/target/${{ matrix.platform.target }}/release/myownmesh-gui
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "GUI binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="myownmesh-gui-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/myownmesh-gui.exe"
            (cd dist-bin && 7z a "${NAME}.zip" myownmesh-gui.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
            rm -f dist-bin/myownmesh-gui.exe
          else
            cp "$BIN" "dist-bin/myownmesh-gui"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin myownmesh-gui
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
            rm -f dist-bin/myownmesh-gui
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-bin/myownmesh-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The NanoKVM device target (Sophgo SG2002, T-Head C906 — riscv64 + musl).
  # Daemon ONLY: the Tauri GUI doesn't cross-compile here and isn't wanted on an
  # appliance. Built with the same Sophgo host-tools toolchain the NanoKVM
  # firmware uses, so `riscv64-unknown-linux-musl-gcc` matches .cargo/config.toml
  # exactly (no env overrides). Ships a static-musl myownmesh-linux-riscv64.tar.gz
  # — the asset a NanoKVM installs at its pinned `.myownmesh-rev`. See
  # docs/NANOKVM.md. A separate job (not a `bundles` matrix row) because that
  # matrix also builds the GUI, which has no riscv64 target.
  daemon-riscv64:
    name: Build (linux-riscv64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: riscv64gc-unknown-linux-musl

      - name: Cache (daemon workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: daemon-riscv64

      # The same Sophgo host-tools NanoKVM's docker/Dockerfile installs; provides
      # riscv64-unknown-linux-musl-gcc on PATH for ring's C build + the linker.
      - name: Install RISC-V musl toolchain (Sophgo host-tools)
        run: |
          set -e
          curl -fsSL --retry 3 --retry-delay 5 -o /tmp/host-tools.tar.gz \
            https://sophon-file.sophon.cn/sophon-prod-s3/drive/23/03/07/16/host-tools.tar.gz
          sudo tar -C /usr/local -xzf /tmp/host-tools.tar.gz
          echo "/usr/local/host-tools/gcc/riscv64-linux-musl-x86_64/bin" >> "$GITHUB_PATH"

      - name: Build daemon (riscv64 musl)
        run: |
          riscv64-unknown-linux-musl-gcc --version | head -1
          cargo build --release --bin myownmesh --target riscv64gc-unknown-linux-musl

      - name: Package portable daemon binary
        shell: bash
        run: |
          set -e
          BIN=target/riscv64gc-unknown-linux-musl/release/myownmesh
          [[ -f "$BIN" ]] || { echo "daemon binary not found at $BIN"; exit 1; }
          mkdir -p dist-bin
          NAME="myownmesh-linux-riscv64"
          cp "$BIN" "dist-bin/myownmesh"
          tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin myownmesh
          (cd dist-bin && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          rm -f dist-bin/myownmesh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-bin/myownmesh-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Detached Ed25519 (minisign) signatures over the portable archives, so the
  # self-updater can prove provenance, not just integrity. Runs once after all
  # platform bundles upload, and is a NO-OP until the maintainer configures the
  # MINISIGN_SECRET_KEY secret (and bakes MYOWNMESH_RELEASE_PUBKEY into the
  # shipped build) — see RELEASE-SIGNING.md. Gating means an unconfigured repo
  # still releases exactly as before.
  sign:
    name: Sign release artifacts (minisign)
    needs: [bundles, daemon-riscv64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Gate on signing key
        id: gate
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -n "$MINISIGN_SECRET_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MINISIGN_SECRET_KEY not configured — skipping signing; artifacts ship SHA-256-only. See RELEASE-SIGNING.md."
          fi

      - name: Install minisign
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -e
          curl -fsSL -o minisign.tar.gz \
            https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-linux.tar.gz
          tar -xzf minisign.tar.gz
          sudo install -m 0755 minisign-linux/x86_64/minisign /usr/local/bin/minisign

      - name: Download release artifacts
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -e
          mkdir -p signing
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir signing \
            --pattern 'myownmesh-*.tar.gz' --pattern 'myownmesh-*.zip'

      - name: Sign and upload signatures
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -e
          printf '%s\n' "$MINISIGN_SECRET_KEY" > signing/minisign.key
          cd signing
          shopt -s nullglob
          # Password-less CI key (see RELEASE-SIGNING.md): no prompt, </dev/null
          # guards against ever hanging on one.
          for f in myownmesh-*.tar.gz myownmesh-*.zip; do
            minisign -S -s minisign.key -m "$f" -x "$f.minisig" </dev/null
          done
          rm -f minisign.key
          gh release upload "$TAG" myownmesh-*.minisig --repo "$GITHUB_REPOSITORY" --clobber
