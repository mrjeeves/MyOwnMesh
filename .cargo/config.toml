# Cross-compilation for the NanoKVM SoC (Sophgo SG2002 / T-Head C906, riscv64).
#
# The daemon ships as a fully static **rv64gc musl** binary, built with
# `cargo-zigbuild` (Zig supplies the C compiler + linker) — NOT the device's
# Sophgo C906 host-tools toolchain. This matters:
#
#   rustc always emits *standard* rv64gc objects for this target. The Sophgo
#   toolchain's gcc defaults to the T-Head **vendor** ISA
#   (rv64imafdcv0p7xthead — draft-0.7 vector + xthead custom ELF attributes).
#   When GNU ld links rustc's objects (and Rust's bundled self-contained musl
#   `libc.a`) with that toolchain's vendor-attributed crt/libgcc, it cannot
#   reconcile the arch attributes and dies with
#   "failed to merge target specific data of file ... libc.a(...)".
#
#   A standard rv64gc toolchain links cleanly, and a static-musl rv64gc binary
#   runs fine on the C906 (which implements the full rv64gc base ISA — the
#   vendor extensions are only needed by code that actually uses them, and the
#   daemon doesn't). Zig is the most reliable way to get that toolchain in CI
#   and on a dev box (no fragile musl-gcc download): `just build-risc` runs
#   `cargo zigbuild`, and `just setup-risc` installs zig + cargo-zigbuild.
#
# This file is inert for normal host builds — it only applies to the
# riscv64gc-unknown-linux-musl target. cargo-zigbuild injects the linker and
# ring's C-compiler/AR via env, so nothing else needs configuring here.
# See docs/NANOKVM.md and .github/workflows/release.yml.

[target.riscv64gc-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
